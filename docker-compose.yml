services:
  couchdb:
    image: couchdb:3
    restart: unless-stopped
    environment:
      COUCHDB_USER: ${COUCHDB_USER:-kanban}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD:-kanban-pwd}
    volumes:
      - ./data/couchdb:/opt/couchdb/data
    ports:
      - "127.0.0.1:5984:5984"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5984/"]
      interval: 10s
      timeout: 5s
      retries: 5

  kanban:
    build: ./app
    depends_on:
      couchdb:
        condition: service_healthy
    env_file:
      - .env
    environment:
      COUCHDB_HOST: couchdb
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data

