<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kanban</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kanban">
<meta name="theme-color" content="#0d0d0f">
<link rel="manifest" href="/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>
<body>

<header>
  <h1 id="appTitle">jc://<span>apply</span>/</h1>
  <div class="header-actions">
    <span class="save-indicator" id="saveIndicator">saved</span>
  </div>
  <div class="header-menu">
    <button class="header-menu-btn" id="headerMenuBtn" title="Menu">☰</button>
    <div class="header-dropdown" id="headerDropdown">
      <a class="header-dd-item" id="menuAllBoards" href="/">All boards</a>
      <button class="header-dd-item" id="menuPrompts">Prompts</button>
      <button class="header-dd-item" id="menuStatistics">Statistics</button>
      <button class="header-dd-item" id="menuSettings">Settings</button>
    </div>
  </div>
</header>

<div id="overview" style="display:none">
  <div class="overview-inner">
    <p class="overview-label">Boards</p>
    <div id="boardGrid" class="board-grid"></div>
    <div class="new-board-row">
      <input id="newBoardInput" class="new-board-input" type="text" placeholder="my-board" maxlength="64" spellcheck="false" autocomplete="off">
      <button id="newBoardBtn" class="btn btn-accent">+ new board</button>
    </div>
    <p id="newBoardError" class="new-board-error" style="display:none"></p>
  </div>
</div>

<div class="board-wrapper">
  <div class="board" id="board"></div>
</div>

<div id="colContextMenu" class="context-menu" style="display:none">
  <button class="ctx-item ctx-danger" id="colCtxClear">✕  Clear column</button>
  <div class="ctx-item ctx-submenu-trigger">
    <span>↪  Move all to</span>
    <span class="ctx-arrow">›</span>
    <div class="ctx-submenu" id="colCtxMoveSubmenu"></div>
  </div>
</div>

<div id="contextMenu" class="context-menu" style="display:none">
  <button class="ctx-item" id="ctxInfo">ℹ  Info</button>
  <button class="ctx-item" id="ctxEdit">✎  Edit</button>
  <div class="ctx-item ctx-submenu-trigger">
    <span>↪  Move to</span>
    <span class="ctx-arrow">›</span>
    <div class="ctx-submenu" id="ctxMoveSubmenu"></div>
  </div>
  <button class="ctx-item ctx-danger" id="ctxDelete">✕  Delete</button>
</div>

<div id="modal" class="modal-backdrop" style="display:none">
  <div class="modal">
    <h2 id="modalTitle">Add Card</h2>
    <div class="modal-field">
      <label>Text</label>
      <textarea id="cardText" rows="2" placeholder="What needs to be done?"></textarea>
    </div>
    <div class="modal-field">
      <label>Description</label>
      <textarea id="cardDesc" rows="3" placeholder="Optional details…"></textarea>
    </div>
    <div class="modal-field">
      <label>Link</label>
      <input id="cardLink" type="url" placeholder="https://…">
    </div>
    <div class="date-row">
      <div class="modal-field">
        <label>Start</label>
        <input id="cardStart" type="date">
      </div>
      <div class="modal-field">
        <label>End</label>
        <input id="cardEnd" type="date">
      </div>
    </div>
    <div class="modal-field">
      <label>Priority</label>
      <div class="priority-row" id="priorityRow"></div>
    </div>
    <div class="modal-field">
      <label>Color</label>
      <div class="color-row" id="colorRow"></div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-accent" id="modalSubmitBtn" onclick="submitCard()">Add Card</button>
    </div>
  </div>
</div>

<div id="loginBackdrop" class="modal-backdrop" style="display:none">
  <div class="modal login-modal">
    <h2>Access required</h2>
    <div class="modal-field">
      <label>Password</label>
      <input id="loginPassword" type="password" placeholder="Enter password…" autocomplete="current-password">
    </div>
    <p id="loginError" class="login-error" style="display:none">Incorrect password</p>
    <div class="modal-actions">
      <button class="btn btn-accent" id="loginSubmitBtn">Enter</button>
    </div>
  </div>
</div>

<div id="promptsBackdrop" class="modal-backdrop" style="display:none">
  <div class="modal prompts-modal">
    <h2>Prompts</h2>
    <div class="prompts-tabs">
      <button class="prompts-tab active" data-tab="searchProfile">Search Profile</button>
      <button class="prompts-tab" data-tab="criteriaInclude">Include</button>
      <button class="prompts-tab" data-tab="criteriaExclude">Exclude</button>
      <button class="prompts-tab" data-tab="searchRadius">Radius</button>
    </div>
    <div class="prompts-panels">
      <div class="prompts-panel active" data-panel="searchProfile">
        <textarea id="promptSearchProfile" class="prompt-textarea" placeholder="Describe the ideal candidate profile to search for…"></textarea>
      </div>
      <div class="prompts-panel" data-panel="criteriaInclude">
        <textarea id="promptCriteriaInclude" class="prompt-textarea" placeholder="List criteria a job must meet to be included…"></textarea>
      </div>
      <div class="prompts-panel" data-panel="criteriaExclude">
        <textarea id="promptCriteriaExclude" class="prompt-textarea" placeholder="List criteria that disqualify a job…"></textarea>
      </div>
      <div class="prompts-panel" data-panel="searchRadius">
        <textarea id="promptSearchRadius" class="prompt-textarea" placeholder="Describe the geographic search radius…"></textarea>
      </div>
    </div>
    <p id="promptsSaveMsg" class="prompts-save-msg"></p>
    <div class="modal-actions">
      <button class="btn" id="promptsCancelBtn">Cancel</button>
      <button class="btn btn-accent" id="promptsSaveBtn">Save</button>
    </div>
  </div>
</div>

<div id="cardInfoBackdrop" class="modal-backdrop" style="display:none">
  <div class="modal card-info-modal">
    <h2>Card Info</h2>
    <div id="cardInfoContent" class="card-info-content"></div>
    <div class="modal-actions">
      <button class="btn btn-accent" onclick="closeCardInfo()">Close</button>
    </div>
  </div>
</div>

<div id="dialogBackdrop" class="modal-backdrop" style="display:none">
  <div class="modal dialog">
    <p id="dialogMsg" class="dialog-msg"></p>
    <div class="modal-actions">
      <button class="btn" id="dialogCancelBtn">Cancel</button>
      <button class="btn" id="dialogOkBtn">Confirm</button>
    </div>
  </div>
</div>

<div id="settingsBackdrop" class="modal-backdrop" style="display:none">
  <div class="modal settings-modal">
    <h2>Settings</h2>
    <div class="settings-section">
      <div class="settings-section-title">Database</div>
      <a class="settings-item" href="http://localhost:5984/_utils" target="_blank" rel="noopener">
        <div class="settings-item-info">
          <div class="settings-item-label">Database admin (Fauxton)</div>
          <div class="settings-item-desc">CouchDB management UI — browse documents, run queries, manage the database</div>
        </div>
        <span class="settings-item-arrow">↗</span>
      </a>
    </div>
    <div class="modal-actions">
      <button class="btn btn-accent" id="settingsCloseBtn">Close</button>
    </div>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
